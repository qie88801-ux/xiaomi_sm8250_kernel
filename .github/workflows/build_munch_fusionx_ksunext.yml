name: Build Munch FusionX Async Marker Kernel
run-name: Build munch FusionX no-KSU async markers
on:
  workflow_dispatch:
    inputs:
      phonea:
        description: Device codename
        required: true
        default: munch
        type: string
      roota:
        description: Root mode
        required: true
        default: fusionx-baseline-noksu-console-asyncmarkers
        type: string

jobs:
  build_job:
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CI: "false"
    steps:
      - name: Prepare toolchain
        run: |
          mkdir "$GITHUB_WORKSPACE/proton-clang"
          cd "$GITHUB_WORKSPACE/proton-clang"
          wget https://github.com/kdrag0n/proton-clang/archive/refs/tags/20210522.zip
          unzip 20210522.zip
          cd ..
          sudo apt update
          sudo apt install -y build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: Build kernel
        run: |
          set -euxo pipefail
          mkdir "$GITHUB_WORKSPACE/kernel_workspace"
          cd "$GITHUB_WORKSPACE/kernel_workspace"
          git clone https://github.com/SenseiiX/fusionX_sm8250 -b stable-next --depth=1 --recurse-submodules --shallow-submodules android_kernel
          cd android_kernel
          git submodule update --init --recursive --depth=1
          echo "[Remove unsupported LLVM optimization flags for Proton clang 13]"
          grep -nE 'regalloc-enable-advisor|enable-ml-inliner|fsplit-machine-functions' Makefile || true
          sed -i -E '/regalloc-enable-advisor|enable-ml-inliner|fsplit-machine-functions/d' Makefile
          ! grep -nE 'regalloc-enable-advisor|enable-ml-inliner|fsplit-machine-functions' Makefile
          echo "[No-KSU console marker baseline: do not patch KernelSU hook wrappers]"
          echo "[Add kernel_init_freeable progress markers]"
          python3 - <<'PY'
          from pathlib import Path
          p = Path("init/main.c")
          s = p.read_text()
          replacements = [
              (
                  '\tdo_basic_setup();\n\n\t/* Open',
                  '\tdo_basic_setup();\n\tpr_err("munch_debug: after do_basic_setup before console\\n");\n\n\t/* Open',
              ),
              (
                  '\t(void) ksys_dup(0);\n\t(void) ksys_dup(0);\n\t/*',
                  '\t(void) ksys_dup(0);\n\t(void) ksys_dup(0);\n\tpr_err("munch_debug: after console open/dup\\n");\n\t/*',
              ),
              (
                  '\tif (!ramdisk_execute_command)\n\t\tramdisk_execute_command = "/init";\n\n\tif (ksys_access',
                  '\tpr_err("munch_debug: before ramdisk command setup current=%s\\n", ramdisk_execute_command ? ramdisk_execute_command : "(null)");\n\tif (!ramdisk_execute_command)\n\t\tramdisk_execute_command = "/init";\n\tpr_err("munch_debug: before ksys_access ramdisk=%s\\n", ramdisk_execute_command ? ramdisk_execute_command : "(null)");\n\n\tif (ksys_access',
              ),
              (
                  '\t\tramdisk_execute_command = NULL;\n\t\tprepare_namespace();\n\t}\n\n\t/*\n\t * Ok, we have completed',
                  '\t\tramdisk_execute_command = NULL;\n\t\tprepare_namespace();\n\t}\n\tpr_err("munch_debug: after ksys_access/prepare_namespace ramdisk=%s\\n", ramdisk_execute_command ? ramdisk_execute_command : "(null)");\n\n\t/*\n\t * Ok, we have completed',
              ),
              (
                  '\tintegrity_load_keys();\n\tload_default_modules();\n}',
                  '\tpr_err("munch_debug: before integrity_load_keys\\n");\n\tintegrity_load_keys();\n\tpr_err("munch_debug: after integrity_load_keys before load_default_modules\\n");\n\tload_default_modules();\n\tpr_err("munch_debug: after load_default_modules leaving kernel_init_freeable\\n");\n}',
              ),
          ]
          for old, new in replacements:
              if old not in s:
                  raise SystemExit(f"missing marker pattern: {old!r}")
              s = s.replace(old, new, 1)
          p.write_text(s)
          PY
          grep -n 'munch_debug' init/main.c
          echo "[Add async progress markers]"
          python3 - <<'PY'
          from pathlib import Path
          p = Path("kernel/async.c")
          s = p.read_text()
          old = '''\tktime_t uninitialized_var(calltime), delta, rettime;\n\n\t/* 1) run (and print duration) */'''
          new = '''\tktime_t uninitialized_var(calltime), delta, rettime;\n\n\tif (system_state < SYSTEM_RUNNING)\n\t\tpr_err("munch_async: start cookie=%lli func=%pF pid=%i\\n",\n\t\t       (long long)entry->cookie, entry->func, task_pid_nr(current));\n\n\t/* 1) run (and print duration) */'''
          if old not in s:
              raise SystemExit("missing async start pattern")
          s = s.replace(old, new, 1)
          old = '''\t/* 2) remove self from the pending queues */\n\tspin_lock_irqsave(&async_lock, flags);'''
          new = '''\tif (system_state < SYSTEM_RUNNING)\n\t\tpr_err("munch_async: done cookie=%lli func=%pF pid=%i\\n",\n\t\t       (long long)entry->cookie, entry->func, task_pid_nr(current));\n\n\t/* 2) remove self from the pending queues */\n\tspin_lock_irqsave(&async_lock, flags);'''
          if old not in s:
              raise SystemExit("missing async done pattern")
          s = s.replace(old, new, 1)
          old = '''\twait_event(async_done, lowest_in_progress(domain) >= cookie);'''
          new = '''\twhile (lowest_in_progress(domain) < cookie) {\n\t\tstruct async_entry *first = NULL;\n\t\tasync_cookie_t first_cookie = ASYNC_COOKIE_MAX;\n\t\tasync_func_t first_func = NULL;\n\t\tunsigned long flags;\n\n\t\tspin_lock_irqsave(&async_lock, flags);\n\t\tif (domain) {\n\t\t\tif (!list_empty(&domain->pending))\n\t\t\t\tfirst = list_first_entry(&domain->pending,\n\t\t\t\t\t\tstruct async_entry, domain_list);\n\t\t} else {\n\t\t\tif (!list_empty(&async_global_pending))\n\t\t\t\tfirst = list_first_entry(&async_global_pending,\n\t\t\t\t\t\tstruct async_entry, global_list);\n\t\t}\n\t\tif (first) {\n\t\t\tfirst_cookie = first->cookie;\n\t\t\tfirst_func = first->func;\n\t\t}\n\t\tspin_unlock_irqrestore(&async_lock, flags);\n\n\t\tif (first_func)\n\t\t\tpr_err("munch_async: waiting target=%lli first=%lli func=%pF pid=%i\\n",\n\t\t\t       (long long)cookie, (long long)first_cookie,\n\t\t\t       first_func, task_pid_nr(current));\n\t\telse\n\t\t\tpr_err("munch_async: waiting target=%lli lowest=%lli no_first pid=%i\\n",\n\t\t\t       (long long)cookie,\n\t\t\t       (long long)lowest_in_progress(domain),\n\t\t\t       task_pid_nr(current));\n\n\t\twait_event_timeout(async_done,\n\t\t\t\t   lowest_in_progress(domain) >= cookie, HZ);\n\t}'''
          if old not in s:
              raise SystemExit("missing async wait pattern")
          s = s.replace(old, new, 1)
          p.write_text(s)
          PY
          grep -n 'munch_async' kernel/async.c

          TOOLCHAIN="$GITHUB_WORKSPACE/proton-clang/proton-clang-20210522/bin"
          ARM32_WRAP="$GITHUB_WORKSPACE/arm32-toolchain-wrapper"
          mkdir -p "$ARM32_WRAP"
          for tool in as ld objcopy elfedit gcc; do
            ln -sf "/usr/bin/arm-linux-gnueabi-$tool" "$ARM32_WRAP/arm-linux-gnueabi-$tool"
          done
          ln -sf /usr/bin/arm-linux-gnueabi-as "$ARM32_WRAP/as"
          ln -sf /usr/bin/arm-linux-gnueabi-ld "$ARM32_WRAP/ld"
          export PATH="/usr/bin:$TOOLCHAIN:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          for tool in ld.lld llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-readelf llvm-strip; do
            test -x "$TOOLCHAIN/$tool"
          done
          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=$TOOLCHAIN/clang LD=$TOOLCHAIN/ld.lld AR=$TOOLCHAIN/llvm-ar NM=$TOOLCHAIN/llvm-nm OBJCOPY=$TOOLCHAIN/llvm-objcopy OBJDUMP=$TOOLCHAIN/llvm-objdump READELF=$TOOLCHAIN/llvm-readelf STRIP=$TOOLCHAIN/llvm-strip CROSS_COMPILE=$TOOLCHAIN/aarch64-linux-gnu- CROSS_COMPILE_ARM32=$ARM32_WRAP/arm-linux-gnueabi- CROSS_COMPILE_COMPAT=$ARM32_WRAP/arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu-"

          echo "[kernel version]"
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) =' Makefile
          echo "[clang version]"
          "$TOOLCHAIN/clang" --version
          echo "[LLVM linker/binutils]"
          "$TOOLCHAIN/ld.lld" --version | head -n 1
          "$TOOLCHAIN/llvm-ar" --version | head -n 1
          echo "[KernelSU-Next tree present but disabled for baseline]"
          test -d KernelSU-Next && git -C KernelSU-Next rev-parse --short HEAD || true

          make $MAKE_ARGS vendor/munch_defconfig
          scripts/config --file out/.config \
            -d MODULES \
            -d KPROBES \
            -d KRETPROBES \
            -d KPROBE_EVENTS \
            -d CFI_CLANG \
            -d SHADOW_CALL_STACK \
            -e SERIAL_MSM_GENI_CONSOLE \
            --set-val LITTLE_CPU_MASK 15 \
            --set-val BIG_CPU_MASK 112 \
            --set-val PRIME_CPU_MASK 128 \
            -d KSU \
            -d KSU_DEBUG
          make $MAKE_ARGS olddefconfig

          echo '--- Final FusionX no-KSU console marker config ---'
          grep -E 'CONFIG_LOCALVERSION|CONFIG_MODULES|CONFIG_KPROBES|CONFIG_KRETPROBES|CONFIG_KPROBE_EVENTS|CONFIG_KSU|CONFIG_MODVERSIONS|CONFIG_MIHW|CONFIG_BUILD_ARM64|CONFIG_LITTLE_CPU_MASK|CONFIG_BIG_CPU_MASK|CONFIG_PRIME_CPU_MASK|CONFIG_LTO|CONFIG_LTO_CLANG|CONFIG_LTO_NONE|CONFIG_CFI_CLANG|CONFIG_SHADOW_CALL_STACK|CONFIG_SERIAL_MSM_GENI_CONSOLE' out/.config || true
          grep -q '^CONFIG_LITTLE_CPU_MASK=15$' out/.config
          grep -q '^CONFIG_BIG_CPU_MASK=112$' out/.config
          grep -q '^CONFIG_PRIME_CPU_MASK=128$' out/.config
          grep -q '^CONFIG_SERIAL_MSM_GENI_CONSOLE=y$' out/.config
          grep -q '^# CONFIG_MODULES is not set$' out/.config
          ! grep -q '^CONFIG_KPROBES=y$' out/.config
          grep -q '^CONFIG_LTO_CLANG=y$' out/.config
          grep -q '^CONFIG_LTO_CLANG_FULL=y$' out/.config
          grep -q '^# CONFIG_KSU is not set$' out/.config

          make $MAKE_ARGS -j"$(nproc)" Image.gz-dtb
          ls -l out/arch/arm64/boot/Image out/arch/arm64/boot/Image.gz out/arch/arm64/boot/Image.gz-dtb || true

          mkdir -p "$GITHUB_WORKSPACE/munch-fusionx-baseline-output"
          cp out/arch/arm64/boot/Image.gz-dtb "$GITHUB_WORKSPACE/munch-fusionx-baseline-output/Image.gz-dtb"
          cp out/arch/arm64/boot/Image "$GITHUB_WORKSPACE/munch-fusionx-baseline-output/Image.raw"
          cp out/.config "$GITHUB_WORKSPACE/munch-fusionx-baseline-output/kernel.config"
          sha256sum "$GITHUB_WORKSPACE/munch-fusionx-baseline-output/Image.gz-dtb" "$GITHUB_WORKSPACE/munch-fusionx-baseline-output/Image.raw" | tee "$GITHUB_WORKSPACE/munch-fusionx-baseline-output/SHA256SUMS"
          strings "$GITHUB_WORKSPACE/munch-fusionx-baseline-output/Image.raw" | grep -m1 'Linux version' | tee "$GITHUB_WORKSPACE/munch-fusionx-baseline-output/kernel-version.txt" || true

      - name: Upload baseline kernel image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.phonea }}-${{ inputs.roota }}-stable-next-image
          path: munch-fusionx-baseline-output/*
          retention-days: 3
