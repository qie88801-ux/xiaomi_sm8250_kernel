name: Build Munch FusionX KSU Next Kernel
run-name: Build munch FusionX KernelSU Next
on:
  workflow_dispatch:
    inputs:
      phonea:
        description: Device codename
        required: true
        default: munch
        type: string
      roota:
        description: Root mode
        required: true
        default: ksunext-fusionx-manual-fixed
        type: string

jobs:
  build_job:
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CI: "false"
    steps:
      - name: Prepare toolchain
        run: |
          mkdir "$GITHUB_WORKSPACE/proton-clang"
          cd "$GITHUB_WORKSPACE/proton-clang"
          wget https://github.com/kdrag0n/proton-clang/archive/refs/tags/20210522.zip
          unzip 20210522.zip
          cd ..
          sudo apt update
          sudo apt install -y build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: Build kernel
        run: |
          set -euxo pipefail
          mkdir "$GITHUB_WORKSPACE/kernel_workspace"
          cd "$GITHUB_WORKSPACE/kernel_workspace"
          git clone https://github.com/SenseiiX/fusionX_sm8250 -b stable-next --depth=1 --recurse-submodules --shallow-submodules android_kernel
          cd android_kernel
          git submodule update --init --recursive --depth=1
          echo "[Remove unsupported LLVM optimization flags for Proton clang 13]"
          grep -nE 'regalloc-enable-advisor|enable-ml-inliner|fsplit-machine-functions' Makefile || true
          sed -i -E '/regalloc-enable-advisor|enable-ml-inliner|fsplit-machine-functions/d' Makefile
          ! grep -nE 'regalloc-enable-advisor|enable-ml-inliner|fsplit-machine-functions' Makefile
          echo "[Route KernelSU-Next through CONFIG_KPROBES when kprobes are enabled]"
          grep -RIn 'KSU_KPROBES_HOOK' fs drivers kernel security || true
          grep -RIl 'KSU_KPROBES_HOOK' fs drivers kernel security | while read -r hook_file; do
            sed -i 's/!defined(CONFIG_KSU_KPROBES_HOOK)/!defined(CONFIG_KPROBES)/g' "$hook_file"
          done
          ! grep -RIn 'KSU_KPROBES_HOOK' fs drivers kernel security
          sed -i 's/^#ifdef CONFIG_KSU$/#if defined(CONFIG_KSU) \&\& !defined(CONFIG_KPROBES)/' drivers/input/input.c
          grep -nE 'CONFIG_KSU|ksu_input_hook|ksu_handle_input_handle_event' drivers/input/input.c
          echo "[Patch KernelSU-Next old execve ksud API wrapper]"
          cat >> drivers/kernelsu/ksud.c <<'EOF'
          
          #if defined(CONFIG_KSU) && !defined(CONFIG_KPROBES)
          int ksu_handle_execve_ksud(const char __user *filename_user,
          			   const char __user *const __user *__argv)
          {
          	struct user_arg_ptr argv = { .ptr.native = __argv };
          	struct filename filename_in, *filename_p;
          	char path[32] = {0};
          	int fd = AT_FDCWD;
          
          	ksu_strncpy_from_user_nofault(path, filename_user, sizeof(path));
          	filename_in.name = path;
          	filename_p = &filename_in;
          	return ksu_handle_execveat_ksud(&fd, &filename_p, &argv, NULL, NULL);
          }
          #endif
          EOF
          grep -n 'ksu_handle_execve_ksud' drivers/kernelsu/ksud.c

          TOOLCHAIN="$GITHUB_WORKSPACE/proton-clang/proton-clang-20210522/bin"
          ARM32_WRAP="$GITHUB_WORKSPACE/arm32-toolchain-wrapper"
          mkdir -p "$ARM32_WRAP"
          for tool in as ld objcopy elfedit gcc; do
            ln -sf "/usr/bin/arm-linux-gnueabi-$tool" "$ARM32_WRAP/arm-linux-gnueabi-$tool"
          done
          ln -sf /usr/bin/arm-linux-gnueabi-as "$ARM32_WRAP/as"
          ln -sf /usr/bin/arm-linux-gnueabi-ld "$ARM32_WRAP/ld"
          export PATH="/usr/bin:$TOOLCHAIN:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          for tool in ld.lld llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-readelf llvm-strip; do
            test -x "$TOOLCHAIN/$tool"
          done
          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=$TOOLCHAIN/clang LD=$TOOLCHAIN/ld.lld AR=$TOOLCHAIN/llvm-ar NM=$TOOLCHAIN/llvm-nm OBJCOPY=$TOOLCHAIN/llvm-objcopy OBJDUMP=$TOOLCHAIN/llvm-objdump READELF=$TOOLCHAIN/llvm-readelf STRIP=$TOOLCHAIN/llvm-strip CROSS_COMPILE=$TOOLCHAIN/aarch64-linux-gnu- CROSS_COMPILE_ARM32=$ARM32_WRAP/arm-linux-gnueabi- CROSS_COMPILE_COMPAT=$ARM32_WRAP/arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu-"

          echo "[kernel version]"
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) =' Makefile
          echo "[clang version]"
          "$TOOLCHAIN/clang" --version
          echo "[LLVM linker/binutils]"
          "$TOOLCHAIN/ld.lld" --version | head -n 1
          "$TOOLCHAIN/llvm-ar" --version | head -n 1
          echo "[KernelSU-Next tree]"
          test -d KernelSU-Next && git -C KernelSU-Next rev-parse --short HEAD || true
          ls -la KernelSU-Next/kernel drivers/kernelsu
          test -f drivers/kernelsu/Kconfig

          make $MAKE_ARGS vendor/munch_defconfig
          scripts/config --file out/.config \
            -d MODULES \
            -d KPROBES \
            -d KRETPROBES \
            -d KPROBE_EVENTS \
            -d CFI_CLANG \
            -d SHADOW_CALL_STACK \
            --set-val LITTLE_CPU_MASK 15 \
            --set-val BIG_CPU_MASK 112 \
            --set-val PRIME_CPU_MASK 128 \
            -e KSU \
            -d KSU_DEBUG
          make $MAKE_ARGS olddefconfig

          echo '--- Final FusionX KSU Next config ---'
          grep -E 'CONFIG_LOCALVERSION|CONFIG_MODULES|CONFIG_KPROBES|CONFIG_KRETPROBES|CONFIG_KPROBE_EVENTS|CONFIG_KSU|CONFIG_MODVERSIONS|CONFIG_MIHW|CONFIG_BUILD_ARM64|CONFIG_LITTLE_CPU_MASK|CONFIG_BIG_CPU_MASK|CONFIG_PRIME_CPU_MASK|CONFIG_LTO|CONFIG_LTO_CLANG|CONFIG_LTO_NONE|CONFIG_CFI_CLANG|CONFIG_SHADOW_CALL_STACK' out/.config || true
          grep -q '^CONFIG_LITTLE_CPU_MASK=15$' out/.config
          grep -q '^CONFIG_BIG_CPU_MASK=112$' out/.config
          grep -q '^CONFIG_PRIME_CPU_MASK=128$' out/.config
          grep -q '^# CONFIG_MODULES is not set$' out/.config
          ! grep -q '^CONFIG_KPROBES=y$' out/.config
          grep -q '^CONFIG_LTO_CLANG=y$' out/.config
          grep -q '^CONFIG_LTO_CLANG_FULL=y$' out/.config
          grep -q '^CONFIG_KSU=y$' out/.config

          make $MAKE_ARGS -j"$(nproc)" Image.gz-dtb
          ls -l out/arch/arm64/boot/Image out/arch/arm64/boot/Image.gz out/arch/arm64/boot/Image.gz-dtb || true

          mkdir -p "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output"
          cp out/arch/arm64/boot/Image.gz-dtb "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output/Image.gz-dtb"
          cp out/arch/arm64/boot/Image "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output/Image.raw"
          cp out/.config "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output/kernel.config"
          sha256sum "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output/Image.gz-dtb" "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output/Image.raw" | tee "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output/SHA256SUMS"
          strings "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output/Image.raw" | grep -m1 'Linux version' | tee "$GITHUB_WORKSPACE/munch-fusionx-ksunext-output/kernel-version.txt" || true

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.phonea }}-${{ inputs.roota }}-stable-next-image
          path: munch-fusionx-ksunext-output/*
          retention-days: 3
