          old = "\tftrace_free_init_mem();\n\tfree_initmem();\n"
          new = "\tftrace_free_init_mem();\n\tpr_err(\"munch_kinit: skipping free_initmem before mark_readonly\\n\");\n\t/* free_initmem(); */\n\tpr_err(\"munch_kinit: after skipped free_initmem before mark_readonly\\n\");\n"
          if old not in text:
              raise SystemExit("free_initmem anchor not found")
          path.write_text(text.replace(old, new, 1))
          PY
          grep -n "skipping free_initmem" init/main.c

          git clone "$ANYKERNEL_REPO" -b "$ANYKERNEL_BRANCH" --single-branch --depth=1 anykernel
          sed -i '/device.name5=lmi/a device.name6=munch' anykernel/anykernel.sh

          make $MAKE_ARGS vendor/munch_defconfig
          scripts/config --file out/.config \
            -d MODULES \
            -d KPROBES \
            -d KRETPROBES \
            -e KSU \
            -e KSU_MANUAL_SU \
            -e KPM \
            -e KSU_SUSFS \
            -e KSU_SUSFS_SUS_PATH \
            -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT \
            -e KSU_SUSFS_SUS_OVERLAYFS \
            -e KSU_SUSFS_TRY_UMOUNT \
            -e KSU_SUSFS_SPOOF_UNAME \
            -e KSU_SUSFS_ENABLE_LOG \
            -d KSU_SUSFS_SUS_SU \
            -e KALLSYMS \
            -e KALLSYMS_ALL \
            --set-str STATIC_USERMODEHELPER_PATH /system/bin/micd \
            -e PERF_CRITICAL_RT_TASK \
            -e SF_BINDER \
            -e OVERLAY_FS \
            -d DEBUG_FS \
            -e MIGT \
            -e MIGT_ENERGY_MODEL \
            -e MIHW \
            -e PACKAGE_RUNTIME_INFO \
            -e BINDER_OPT \
            -e KPERFEVENTS \
            -e MILLET \
            -e PERF_HUMANTASK \
            -e LTO \
            -e LTO_CLANG \
            -e LTO_CLANG_FULL \
            -d LTO_CLANG_THIN \
            -d LTO_NONE \
            -d LOCALVERSION_AUTO \
            -e XIAOMI_MIUI \
            -e SERIAL_MSM_GENI_CONSOLE \
            --set-val LITTLE_CPU_MASK 15 \
            --set-val BIG_CPU_MASK 112 \
            --set-val PRIME_CPU_MASK 128 \
            -d CFI_CLANG \
            -d SHADOW_CALL_STACK \
            -d MI_MEMORY_SYSFS \
            -e TASK_DELAY_ACCT \
            -e MIUI_ZRAM_MEMORY_TRACKING \
            -d CONFIG_MODULE_SIG_SHA512 \
            -d CONFIG_MODULE_SIG_HASH \
            -e MI_FRAGMENTION \
            -e PERF_HELPER \
            -e BOOTUP_RECLAIM \
            -e MI_RECLAIM \
            -e RTMM
          make $MAKE_ARGS olddefconfig

          echo "[final SukiSU config]"
          grep -E 'CONFIG_LOCALVERSION|CONFIG_MODULES|CONFIG_KPROBES|CONFIG_KRETPROBES|CONFIG_KSU|CONFIG_KPM|CONFIG_KSU_SUSFS|CONFIG_KALLSYMS|CONFIG_LITTLE_CPU_MASK|CONFIG_BIG_CPU_MASK|CONFIG_PRIME_CPU_MASK|CONFIG_SERIAL_MSM_GENI_CONSOLE|CONFIG_BUILD_ARM64|CONFIG_LTO|CONFIG_CFI_CLANG|CONFIG_SHADOW_CALL_STACK' out/.config || true
          grep -q '^CONFIG_KSU=y' out/.config
          grep -q '^CONFIG_KPM=y' out/.config
          grep -q '^CONFIG_KSU_SUSFS=y' out/.config
          grep -q '^CONFIG_KSU_SUSFS_SUS_PATH=y' out/.config
          grep -q '^CONFIG_KSU_SUSFS_SUS_MOUNT=y' out/.config
          grep -q '^CONFIG_KSU_SUSFS_SUS_KSTAT=y' out/.config
          grep -q '^CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y' out/.config
          grep -q '^CONFIG_KSU_SUSFS_TRY_UMOUNT=y' out/.config
          grep -q '^CONFIG_KSU_SUSFS_SPOOF_UNAME=y' out/.config
          grep -q '^CONFIG_KSU_SUSFS_ENABLE_LOG=y' out/.config
          ! grep -q '^CONFIG_KSU_SUSFS_SUS_SU=y' out/.config
          grep -q '^CONFIG_KALLSYMS_ALL=y' out/.config
          grep -q '^CONFIG_SERIAL_MSM_GENI_CONSOLE=y' out/.config
          grep -q '^# CONFIG_MODULES is not set' out/.config
          ! grep -q '^CONFIG_KPROBES=y' out/.config
          grep -q '^CONFIG_LITTLE_CPU_MASK=15$' out/.config
          grep -q '^CONFIG_BIG_CPU_MASK=112$' out/.config
          grep -q '^CONFIG_PRIME_CPU_MASK=128$' out/.config
          grep -q '^CONFIG_LTO_CLANG=y' out/.config
          grep -q '^CONFIG_LTO_CLANG_FULL=y' out/.config

          make $MAKE_ARGS -j"$(nproc)" Image.gz-dtb
          test -f out/arch/arm64/boot/Image
          test -f out/arch/arm64/boot/Image.gz-dtb

          rm -rf anykernel/kernels
          mkdir -p anykernel/kernels
          cp out/arch/arm64/boot/Image.gz-dtb anykernel/kernels/Image

          cp out/arch/arm64/boot/Image "$GITHUB_WORKSPACE/sukisu-output/Image"
          cp out/arch/arm64/boot/Image.gz-dtb "$GITHUB_WORKSPACE/sukisu-output/Image.gz-dtb"
          cp out/.config "$GITHUB_WORKSPACE/sukisu-output/kernel.config"

          (
            cd anykernel
            ZIP_FILENAME="Kernel_MIUI_${DEVICE}_FusionX-skipfreeinit-manualhook-kpm-susfs_SukiSU-Ultra-v4.1.3_$(date +'%Y%m%d_%H%M%S')_anykernel3_$(git rev-parse --short=8 HEAD).zip"
            zip -r9 "$ZIP_FILENAME" ./* -x .git .gitignore out/ ./*.zip
            mv "$ZIP_FILENAME" "$GITHUB_WORKSPACE/sukisu-output/"
          )

          {
            echo "device=${DEVICE}"
            echo "rom=MIUI"
            echo "root=SukiSU Ultra"
            echo "sukisu_ref=${SUKISU_REF}"
            echo "sukisu_commit=${SUKISU_COMMIT}"
            echo "susfs_ref=${SUSFS_REF}"
            echo "susfs_commit=${SUSFS_COMMIT}"
            echo "kernel_repo=${KERNEL_REPO}"
            echo "kernel_branch=${KERNEL_BRANCH}"
            echo "kernel_commit=$(git rev-parse HEAD)"
            echo "anykernel_repo=${ANYKERNEL_REPO}"
            echo "anykernel_branch=${ANYKERNEL_BRANCH}"
            echo "anykernel_commit=$(git -C anykernel rev-parse HEAD)"
            strings out/arch/arm64/boot/Image | grep -m1 'Linux version' || true
          } | tee "$GITHUB_WORKSPACE/sukisu-output/build-info.txt"

          sha256sum "$GITHUB_WORKSPACE"/sukisu-output/* | tee "$GITHUB_WORKSPACE/sukisu-output/SHA256SUMS"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: munch-sukisu-ultra-v413-fusionx-skipfreeinit
          path: sukisu-output/*
          retention-days: 7

      - name: Publish output branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          OUT_BRANCH="artifact-munch-sukisu-ultra-v413-fusionx-${GITHUB_RUN_ID}"
          OUT_DIR="munch-sukisu-ultra-v413-fusionx-${GITHUB_RUN_ID}"
          if [ ! -d sukisu-output ]; then
            mkdir -p sukisu-output
            echo "sukisu-output was not created before failure" > sukisu-output/build-step.log
          fi
          mkdir -p publish-repo "$OUT_DIR"
          cp -a sukisu-output/. "$OUT_DIR/"
          cd publish-repo
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b "$OUT_BRANCH"
          cp -a "../$OUT_DIR" .
          git add .
          git commit -m "Publish munch SukiSU Ultra v4.1.3 artifact ${GITHUB_RUN_ID}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin "$OUT_BRANCH"
          echo "output_branch=${OUT_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
