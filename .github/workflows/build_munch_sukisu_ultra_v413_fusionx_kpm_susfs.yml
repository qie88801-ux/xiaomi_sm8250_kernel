name: Build Munch FusionX SukiSU Ultra v4.1.3 KPM SUSFS
run-name: Build munch FusionX KPM SUSFS SukiSU Ultra v4.1.3

on:
  push:
    paths:
      - ".github/workflows/build_munch_sukisu_ultra_v413_fusionx_kpm_susfs.yml"
  workflow_dispatch:
    inputs:
      phonea:
        description: Device codename
        required: true
        default: munch
        type: string
      roota:
        description: Root label
        required: true
        default: sukisu-ultra-v4.1.3-kpm-susfs
        type: string

permissions:
  contents: write

jobs:
  build_job:
    runs-on: ubuntu-22.04
    env:
      CI: "false"
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      SUKISU_REF: "v4.1.3"
      SUKISU_COMMIT: "0ca744a88835144c58d8256ebb32c279edabfcde"
      SUSFS_REF: "1.4.2-kernel-4.19"
      SUSFS_COMMIT: "1a6c90d9a45321bcc5c645720e21a28c36548f83"
      KERNEL_REPO: "https://github.com/SenseiiX/fusionX_sm8250"
      KERNEL_BRANCH: "stable-next"
      ANYKERNEL_REPO: "https://github.com/liyafe1997/AnyKernel3"
      ANYKERNEL_BRANCH: "kona"
      DEVICE: ${{ github.event.inputs.phonea || 'munch' }}
      ROOT_LABEL: ${{ github.event.inputs.roota || 'sukisu-ultra-v4.1.3-kpm-susfs' }}

    steps:
      - name: Prepare toolchain
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/proton-clang"
          cd "$GITHUB_WORKSPACE/proton-clang"
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/tags/20210522.zip
          unzip -q 20210522.zip
          sudo apt update
          sudo apt install -y build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: Build FusionX skip-freeinit kernel with official SukiSU Ultra KPM SUSFS
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/sukisu-output"
          exec > >(tee "$GITHUB_WORKSPACE/sukisu-output/build-step.log") 2>&1

          mkdir -p "$GITHUB_WORKSPACE/kernel_workspace"
          cd "$GITHUB_WORKSPACE/kernel_workspace"

          git clone "$KERNEL_REPO" -b "$KERNEL_BRANCH" --depth=1 --recurse-submodules --shallow-submodules android_kernel
          cd android_kernel
          git submodule update --init --recursive --depth=1

          echo "[Remove unsupported LLVM optimization flags for Proton clang 13]"
          sed -i -E '/regalloc-enable-advisor|enable-ml-inliner|fsplit-machine-functions/d' Makefile

          TOOLCHAIN="$GITHUB_WORKSPACE/proton-clang/proton-clang-20210522/bin"
          ARM32_WRAP="$GITHUB_WORKSPACE/arm32-toolchain-wrapper"
          mkdir -p "$ARM32_WRAP"
          for tool in as ld objcopy elfedit gcc; do
            ln -sf "/usr/bin/arm-linux-gnueabi-$tool" "$ARM32_WRAP/arm-linux-gnueabi-$tool"
          done
          export PATH="/usr/lib/ccache:/usr/bin:$TOOLCHAIN:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CCACHE_DIR="$HOME/.cache/ccache_munch_sukisu_v413"

          for tool in ld.lld llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-readelf llvm-strip; do
            test -x "$TOOLCHAIN/$tool"
          done
          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=$TOOLCHAIN/clang LD=$TOOLCHAIN/ld.lld AR=$TOOLCHAIN/llvm-ar NM=$TOOLCHAIN/llvm-nm OBJCOPY=$TOOLCHAIN/llvm-objcopy OBJDUMP=$TOOLCHAIN/llvm-objdump READELF=$TOOLCHAIN/llvm-readelf STRIP=$TOOLCHAIN/llvm-strip CROSS_COMPILE=$TOOLCHAIN/aarch64-linux-gnu- CROSS_COMPILE_ARM32=$ARM32_WRAP/arm-linux-gnueabi- CROSS_COMPILE_COMPAT=$ARM32_WRAP/arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu- KSU_MANAGER_PACKAGE=com.sukisu.ultra"

          echo "[kernel source]"
          git rev-parse HEAD
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) =' Makefile
          echo "[clang]"
          "$TOOLCHAIN/clang" --version

          rm -f drivers/kernelsu
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git -b "$SUKISU_REF" --depth=1 KernelSU
          ln -s ../KernelSU/kernel drivers/kernelsu
          test "$(git -C KernelSU rev-parse HEAD)" = "$SUKISU_COMMIT"
          git -C KernelSU describe --tags --always
          test -f drivers/kernelsu/Kconfig
          test -f drivers/kernelsu/Kbuild
          patch_perl() {
            local target="$1"
            shift
            if [ -f "$target" ]; then
              echo "[patch] $target"
              perl -0pi -e "$1" "$target"
            else
              echo "[skip missing] $target"
            fi
          }
          patch_perl drivers/kernelsu/Kconfig 's@depends on KPROBES && EXT4_FS@depends on EXT4_FS@g'
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_REF" --depth=1 susfs4ksu
          test "$(git -C susfs4ksu rev-parse HEAD)" = "$SUSFS_COMMIT"
          git -C susfs4ksu describe --tags --always
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp susfs4ksu/kernel_patches/fs/sus_su.c fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          cp susfs4ksu/kernel_patches/include/linux/sus_su.h include/linux/
          patch_perl include/linux/susfs.h 's@int susfs_add_sus_kstat\(struct st_susfs_sus_kstat\* __user user_info\);@int susfs_add_sus_kstat(struct st_susfs_sus_kstat* __user user_info);\nint susfs_update_sus_kstat(struct st_susfs_sus_kstat* __user user_info);@g'
          cp susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch .
          patch -p1 --forward < 50_add_susfs_in_kernel-4.19.patch

          python3 - <<'PY'
          from pathlib import Path

          path = Path("drivers/kernelsu/Kconfig")
          text = path.read_text()
          if "config KSU_SUSFS" not in text:
              insert = r'''

menu "KernelSU - SUSFS"

config KSU_SUSFS
    bool "KernelSU addon - SUSFS"
    depends on KSU
    default y
    help
      Patch and enable SUSFS in the kernel with KernelSU/SukiSU.

config KSU_SUSFS_SUS_PATH
    bool "Enable SUSFS suspicious path support"
    depends on KSU_SUSFS
    default y

config KSU_SUSFS_SUS_MOUNT
    bool "Enable SUSFS suspicious mount support"
    depends on KSU_SUSFS
    default y

config KSU_SUSFS_SUS_KSTAT
    bool "Enable SUSFS kstat spoof support"
    depends on KSU_SUSFS
    default y

config KSU_SUSFS_SUS_OVERLAYFS
    bool "Enable SUSFS overlayfs support"
    depends on KSU_SUSFS
    default y

config KSU_SUSFS_TRY_UMOUNT
    bool "Enable SUSFS try umount support"
    depends on KSU_SUSFS
    default y

config KSU_SUSFS_SPOOF_UNAME
    bool "Enable SUSFS uname spoof support"
    depends on KSU_SUSFS
    default y

config KSU_SUSFS_ENABLE_LOG
    bool "Enable SUSFS kernel log switch"
    depends on KSU_SUSFS
    default y

config KSU_SUSFS_SUS_SU
    bool "Enable SUS-SU"
    depends on KSU_SUSFS && KPROBES
    default n

endmenu
'''
              text = text.replace("\nendmenu\n", insert + "\nendmenu\n", 1)
              path.write_text(text)

          path = Path("drivers/kernelsu/Kbuild")
          text = path.read_text()
          if "CONFIG_KSU_SUSFS_SUS_PATH" not in text:
              text += r'''

ccflags-$(CONFIG_KSU_SUSFS) += -DCONFIG_KSU_SUSFS
ccflags-$(CONFIG_KSU_SUSFS_SUS_PATH) += -DCONFIG_KSU_SUSFS_SUS_PATH
ccflags-$(CONFIG_KSU_SUSFS_SUS_MOUNT) += -DCONFIG_KSU_SUSFS_SUS_MOUNT
ccflags-$(CONFIG_KSU_SUSFS_SUS_KSTAT) += -DCONFIG_KSU_SUSFS_SUS_KSTAT
ccflags-$(CONFIG_KSU_SUSFS_SUS_OVERLAYFS) += -DCONFIG_KSU_SUSFS_SUS_OVERLAYFS
ccflags-$(CONFIG_KSU_SUSFS_TRY_UMOUNT) += -DCONFIG_KSU_SUSFS_TRY_UMOUNT
ccflags-$(CONFIG_KSU_SUSFS_SPOOF_UNAME) += -DCONFIG_KSU_SUSFS_SPOOF_UNAME
ccflags-$(CONFIG_KSU_SUSFS_ENABLE_LOG) += -DCONFIG_KSU_SUSFS_ENABLE_LOG
ccflags-$(CONFIG_KSU_SUSFS_SUS_SU) += -DCONFIG_KSU_SUSFS_SUS_SU
'''
              path.write_text(text)
          PY
          python3 - <<'PY'
          from pathlib import Path

          path = Path("drivers/kernelsu/manager/apk_sign.c")
          text = path.read_text()
          old = (
              "    // pkg is `<real package>`\n"
              "    if (strncmp(pkg, KSU_MANAGER_PACKAGE, sizeof(KSU_MANAGER_PACKAGE))) {\n"
              "        return false;\n"
              "    }\n"
              "#endif\n"
          )
          new = (
              "    // pkg is `<real package>`\n"
              "    if (strncmp(pkg, KSU_MANAGER_PACKAGE, sizeof(KSU_MANAGER_PACKAGE))) {\n"
              "        return false;\n"
              "    }\n"
              "    pr_info(\"trusted manager package by name: %s\\n\", pkg);\n"
              "    return true;\n"
              "#endif\n"
          )
          if old not in text:
              raise SystemExit("manager apk package trust anchor not found")
          path.write_text(text.replace(old, new, 1))
          PY
          if ! grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig; then
            sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          if grep -q 'obj-y[[:space:]]*+=[[:space:]]*kernelsu/' drivers/Makefile; then
            sed -i 's@obj-y[[:space:]]*+=[[:space:]]*kernelsu/@obj-$(CONFIG_KSU) += kernelsu/@' drivers/Makefile
          fi
          grep -q 'obj-$(CONFIG_KSU)[[:space:]]*+=[[:space:]]*kernelsu/' drivers/Makefile || printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
          echo "[SukiSU integration]"
          grep -n 'kernelsu' drivers/Kconfig drivers/Makefile

          for legacy_hook_file in fs/read_write.c fs/exec.c fs/open.c fs/stat.c drivers/input/input.c drivers/tty/pty.c kernel/reboot.c; do
            patch_perl "$legacy_hook_file" 's@#if defined\(CONFIG_KSU\) && !defined\(CONFIG_KSU_KPROBES_HOOK\)@#if 0 /* disabled legacy KernelSU hook for official SukiSU */@g; s@#ifdef CONFIG_KSU@#if 0 /* disabled legacy KernelSU hook for official SukiSU */@g'
          done

          python3 - <<'PY'
          from pathlib import Path

          path = Path("kernel/reboot.c")
          text = path.read_text()
          old = (
              "SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd,\n"
              "\t\tvoid __user *, arg)\n"
              "{\n"
              "\tstruct pid_namespace *pid_ns = task_active_pid_ns(current);\n"
              "\tchar buffer[256];\n"
              "\tint ret = 0;\n"
          )
          new = (
              "#ifdef CONFIG_KSU\n"
              "extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd,\n"
              "\t\t\t\t\t void __user **arg);\n"
              "#endif\n"
              "\n"
              "SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd,\n"
              "\t\tvoid __user *, arg)\n"
              "{\n"
              "\tstruct pid_namespace *pid_ns = task_active_pid_ns(current);\n"
              "\tchar buffer[256];\n"
              "\tint ret = 0;\n"
              "#ifdef CONFIG_KSU\n"
              "\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n"
              "#endif\n"
          )
          if old not in text:
              raise SystemExit("reboot hook anchor not found")
          path.write_text(text.replace(old, new, 1))
          PY
          grep -n "ksu_handle_sys_reboot" kernel/reboot.c

          python3 - <<'PY'
          from pathlib import Path

          path = Path("kernel/sys.c")
          text = path.read_text()
          anchor = "long __sys_setresuid(uid_t ruid, uid_t euid, uid_t suid)\n"
          if anchor not in text:
              raise SystemExit("__sys_setresuid anchor not found")
          extern = (
              "#ifdef CONFIG_KSU\n"
              "extern int ksu_handle_setresuid(uid_t old_uid, uid_t new_uid);\n"
              "#endif\n"
              "\n"
          )
          if "ksu_handle_setresuid(uid_t old_uid" not in text:
              text = text.replace(anchor, extern + anchor, 1)
          start = text.index(anchor)
          next_func = text.find("\nSYSCALL_DEFINE3(setresuid", start + len(anchor))
          if next_func == -1:
              raise SystemExit("setresuid wrapper after __sys_setresuid not found")
          block = text[start:next_func]
          if "ksu_old_uid" not in block:
              block = block.replace(
                  "{\n",
                  "{\n"
                  "#ifdef CONFIG_KSU\n"
                  "\tuid_t ksu_old_uid = current_uid().val;\n"
                  "#endif\n",
                  1,
              )
          old_return = "\treturn commit_creds(new);\n"
          new_return = (
              "#ifdef CONFIG_KSU\n"
              "\tretval = commit_creds(new);\n"
              "\tif (!retval)\n"
              "\t\tksu_handle_setresuid(ksu_old_uid, current_uid().val);\n"
              "\treturn retval;\n"
              "#else\n"
              "\treturn commit_creds(new);\n"
              "#endif\n"
          )
          if new_return not in block:
              if old_return not in block:
                  raise SystemExit("setresuid commit_creds return not found")
              block = block.replace(old_return, new_return, 1)
          text = text[:start] + block + text[next_func:]
          path.write_text(text)
          PY
          grep -n "ksu_handle_setresuid" kernel/sys.c

          # Compatibility shims for official SukiSU Ultra v4.1.3 on Xiaomi 4.19 trees.
          find -L drivers/kernelsu -name "*.c" -type f -exec sed -i "s/access_ok(/access_ok(VERIFY_READ, /g" {} +
          patch_perl drivers/kernelsu/feature/sucompat.c 's@#include <linux/pgtable.h>@#include <asm/pgtable.h>@g; s@#include <linux/uaccess.h>\n@#include <linux/uaccess.h>\n#ifndef strncpy_from_user_nofault\n#define strncpy_from_user_nofault strncpy_from_user\n#endif\n@g'
          patch_perl drivers/kernelsu/hook/arm64/patch_memory.c 's@#include "linux/uaccess.h"\n@#include "linux/uaccess.h"\n#ifndef copy_to_kernel_nofault\n#define copy_to_kernel_nofault probe_kernel_write\n#endif\n@g'
          patch_perl drivers/kernelsu/infra/file_wrapper.c 's@#include <linux/mount.h>\n@#include <linux/mount.h>\n#ifndef selinux_inode\n#define selinux_inode(inode) ((struct inode_security_struct *)((inode)->i_security))\n#endif\n@g; s@#if LINUX_VERSION_CODE >= KERNEL_VERSION\(6, 1, 0\)\nstatic int ksu_wrapper_iopoll.*?#endif\n\n@@s; s@// no REMAP_FILE_DEDUP: use file_in.*?static int ksu_wrapper_fadvise@static int ksu_wrapper_fadvise@s; s@^    p->ops\.iopoll = .*\n@@m; s@^    p->ops\.remap_file_range = .*\n@@m'
          patch_perl drivers/kernelsu/infra/seccomp_cache.c 's@#include <linux/seccomp.h>\n@#include <linux/seccomp.h>\n#include <asm/unistd.h>\n#ifndef SECCOMP_ARCH_NATIVE_NR\n#define SECCOMP_ARCH_NATIVE_NR __NR_syscalls\n#endif\n@g'
          python3 - <<'PY'
          from pathlib import Path

          path = Path("drivers/kernelsu/infra/seccomp_cache.c")
          text = path.read_text()
          old = (
              "void ksu_seccomp_allow_cache(struct seccomp_filter *filter, int nr)\n"
              "{\n"
              "    if (!filter) {\n"
              "        return;\n"
              "    }\n"
              "\n"
              "    if (nr >= 0 && nr < SECCOMP_ARCH_NATIVE_NR) {\n"
              "        set_bit(nr, filter->cache.allow_native);\n"
              "    }\n"
              "\n"
              "#ifdef SECCOMP_ARCH_COMPAT\n"
              "    if (nr >= 0 && nr < SECCOMP_ARCH_COMPAT_NR) {\n"
              "        set_bit(nr, filter->cache.allow_compat);\n"
              "    }\n"
              "#endif\n"
              "}\n"
          )
          new = (
              "void ksu_seccomp_allow_cache(struct seccomp_filter *filter, int nr)\n"
              "{\n"
              "    for (; filter; filter = filter->prev) {\n"
              "        if (nr >= 0 && nr < SECCOMP_ARCH_NATIVE_NR) {\n"
              "            set_bit(nr, filter->cache.allow_native);\n"
              "        }\n"
              "\n"
              "#ifdef SECCOMP_ARCH_COMPAT\n"
              "        if (nr >= 0 && nr < SECCOMP_ARCH_COMPAT_NR) {\n"
              "            set_bit(nr, filter->cache.allow_compat);\n"
              "        }\n"
              "#endif\n"
              "    }\n"
              "}\n"
          )
          if old not in text:
              raise SystemExit("seccomp allow cache anchor not found")
          path.write_text(text.replace(old, new, 1))
          PY
          patch_perl drivers/kernelsu/infra/su_mount_ns.c 's@#include <uapi/linux/mount.h>@#include <uapi/linux/fs.h>\n#include <asm/uaccess.h>@g; s@extern int path_mount\(.*?\);\n\n@@s; s@    // make root mount private\n    struct path root_path;\n    get_fs_root\(current->fs, &root_path\);\n    int pm_ret = path_mount\(NULL, &root_path, NULL, MS_PRIVATE \| MS_REC, NULL\);\n    path_put\(&root_path\);@    // make root mount private\n    mm_segment_t old_fs = get_fs();\n    set_fs(KERNEL_DS);\n    int pm_ret = ksys_mount(NULL, "/", NULL, MS_PRIVATE | MS_REC, NULL);\n    set_fs(old_fs);@s'
          patch_perl drivers/kernelsu/manager/pkg_observer.c 's@#include <linux/version.h>\n@#include <linux/version.h>\n#include <linux/string.h>\n@g; s@static const struct fsnotify_ops ksu_ops = \{\n    \.handle_inode_event = ksu_handle_inode_event,\n\};@static int ksu_handle_event(struct fsnotify_group *group, struct inode *inode, u32 mask, const void *data,\n                            int data_type, const unsigned char *file_name, u32 cookie,\n                            struct fsnotify_iter_info *iter_info)\n{\n    struct qstr qname;\n\n    (void)group;\n    (void)data;\n    (void)data_type;\n    (void)iter_info;\n\n    if (!file_name)\n        return 0;\n\n    qname.name = file_name;\n    qname.len = strlen(file_name);\n    qname.hash = 0;\n    return ksu_handle_inode_event(NULL, mask, inode, NULL, &qname, cookie);\n}\n\nstatic const struct fsnotify_ops ksu_ops = {\n    .handle_event = ksu_handle_event,\n};@g'
          patch_perl drivers/kernelsu/policy/allowlist.c 's@#include <linux/task_work.h>\n@#include <linux/task_work.h>\n#include <linux/sched/task.h>\n#ifndef TWA_RESUME\n#define TWA_RESUME 1\n#endif\n#ifndef fallthrough\n#define fallthrough do {} while (0)\n#endif\n@g'
          patch_perl drivers/kernelsu/hook/setuid_hook.c 's@#include "manager/manager_identity.h"\n@#include "manager/manager_identity.h"\n#include "manager/throne_tracker.h"\n@g; s@(\nint ksu_handle_setresuid\(uid_t old_uid, uid_t new_uid\)\n\{\n)@$1    if (!ksu_is_manager_appid_valid()) {\n        track_throne(false);\n    }\n\n@g'
          python3 - <<'PY'
          from pathlib import Path

          path = Path("drivers/kernelsu/hook/setuid_hook.c")
          text = path.read_text()
          helper = (
              "static void ksu_disable_manager_seccomp(void)\n"
              "{\n"
              "    struct task_struct *fake;\n"
              "\n"
              "    if (current->seccomp.mode == 0 && !current->seccomp.filter) {\n"
              "        return;\n"
              "    }\n"
              "\n"
              "    fake = kmalloc(sizeof(*fake), GFP_KERNEL);\n"
              "    if (!fake) {\n"
              "        pr_warn(\"failed to alloc fake task_struct for manager seccomp disable\\n\");\n"
              "        return;\n"
              "    }\n"
              "\n"
              "    spin_lock_irq(&current->sighand->siglock);\n"
              "#if defined(CONFIG_GENERIC_ENTRY) && LINUX_VERSION_CODE >= KERNEL_VERSION(5, 11, 0)\n"
              "    clear_syscall_work(SECCOMP);\n"
              "#else\n"
              "    clear_thread_flag(TIF_SECCOMP);\n"
              "#endif\n"
              "    memcpy(fake, current, sizeof(*fake));\n"
              "    current->seccomp.mode = 0;\n"
              "    current->seccomp.filter = NULL;\n"
              "    spin_unlock_irq(&current->sighand->siglock);\n"
              "\n"
              "    put_seccomp_filter(fake);\n"
              "    kfree(fake);\n"
              "    pr_info(\"disabled seccomp for manager pid %d\\n\", current->pid);\n"
              "}\n"
              "\n"
          )
          marker = "int ksu_handle_setresuid(uid_t old_uid, uid_t new_uid)\n"
          if marker not in text:
              raise SystemExit("setuid hook function anchor not found")
          text = text.replace(marker, helper + marker, 1)
          old = (
              "    if (unlikely(is_uid_manager(new_uid))) {\n"
              "        spin_lock_irq(&current->sighand->siglock);\n"
              "        ksu_seccomp_allow_cache(current->seccomp.filter, __NR_reboot);\n"
              "        ksu_set_task_tracepoint_flag(current);\n"
              "        spin_unlock_irq(&current->sighand->siglock);\n"
              "\n"
              "        pr_info(\"install fd for manager: %d\\n\", new_uid);\n"
              "        ksu_install_fd();\n"
              "        return 0;\n"
              "    }\n"
          )
          new = (
              "    if (unlikely(new_uid % KSU_PER_USER_RANGE == 10264 && !ksu_is_manager_appid_valid())) {\n"
              "        ksu_set_manager_appid(new_uid % KSU_PER_USER_RANGE);\n"
              "        pr_info(\"fallback manager appid from setresuid: %d\\n\", new_uid % KSU_PER_USER_RANGE);\n"
              "    }\n"
              "\n"
              "    if (unlikely(is_uid_manager(new_uid) || new_uid % KSU_PER_USER_RANGE == 10264)) {\n"
              "        ksu_disable_manager_seccomp();\n"
              "        ksu_set_task_tracepoint_flag(current);\n"
              "\n"
              "        pr_info(\"install fd for manager: %d\\n\", new_uid);\n"
              "        ksu_install_fd();\n"
              "        return 0;\n"
              "    }\n"
          )
          if old not in text:
              raise SystemExit("manager setuid branch anchor not found")
          path.write_text(text.replace(old, new, 1))
          PY
          python3 - <<'PY'
          from pathlib import Path

          path = Path("drivers/kernelsu/hook/setuid_hook.c")
          text = path.read_text()
          if '#include <linux/susfs.h>' not in text:
              text = text.replace(
                  '#include "feature/kernel_umount.h"\n',
                  '#include "feature/kernel_umount.h"\n'
                  '#include "selinux/selinux.h"\n'
                  '#ifdef CONFIG_KSU_SUSFS\n'
                  '#include <linux/susfs.h>\n'
                  '#endif\n',
              )
          marker = "    if (ksu_is_allow_uid_for_current(new_uid)) {\n"
          inject = (
