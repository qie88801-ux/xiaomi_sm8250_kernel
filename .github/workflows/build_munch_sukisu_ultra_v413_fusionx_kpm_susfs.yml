          #endif

          static bool ksu_kernel_umount_enabled = true;

          static int kernel_umount_feature_get(u64 *value)
          {
              *value = ksu_kernel_umount_enabled ? 1 : 0;
              return 0;
          }

          static int kernel_umount_feature_set(u64 value)
          {
              ksu_kernel_umount_enabled = value != 0;
              pr_info("kernel_umount: set to %d\n", ksu_kernel_umount_enabled);
              return 0;
          }

          static const struct ksu_feature_handler kernel_umount_handler = {
              .feature_id = KSU_FEATURE_KERNEL_UMOUNT,
              .name = "kernel_umount",
              .get_handler = kernel_umount_feature_get,
              .set_handler = kernel_umount_feature_set,
          };

          extern int path_umount(struct path *path, int flags);

          void try_umount(const char *mnt, bool check_mnt, int flags)
          {
              struct path path;
              int err = kern_path(mnt, 0, &path);
              if (err)
                  return;

              if (check_mnt && path.dentry != path.mnt->mnt_root) {
                  path_put(&path);
                  return;
              }

              err = path_umount(&path, flags);
              if (err)
                  pr_info("umount %s failed: %d\n", mnt, err);
          }

          int ksu_handle_umount(uid_t old_uid, uid_t new_uid)
          {
              struct mount_entry *entry;
              const struct cred *saved;

              if (!ksu_kernel_umount_enabled || !ksu_cred)
                  return 0;

              if (!is_appuid(new_uid) && !is_isolated_process(new_uid))
                  return 0;

              if (!ksu_uid_should_umount(new_uid) && !is_isolated_process(new_uid))
                  return 0;

              if (!is_zygote(current_cred())) {
                  pr_info("handle umount ignore non zygote child: %d\n", current->pid);
                  return 0;
              }

              saved = override_creds(ksu_cred);

          #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT
              susfs_try_umount(new_uid);
          #endif

              down_read(&mount_list_lock);
              list_for_each_entry(entry, &mount_list, list) {
                  pr_info("%s: unmounting: %s flags: 0x%x\n", __func__, entry->umountable, entry->flags);
                  try_umount(entry->umountable, true, entry->flags);
              }
              up_read(&mount_list_lock);

              revert_creds(saved);
              return 0;
          }

          void __init ksu_kernel_umount_init(void)
          {
              if (ksu_register_feature_handler(&kernel_umount_handler))
                  pr_err("Failed to register kernel_umount feature handler\n");
          }

          void __exit ksu_kernel_umount_exit(void)
          {
              ksu_unregister_feature_handler(KSU_FEATURE_KERNEL_UMOUNT);
          }
          EOF

