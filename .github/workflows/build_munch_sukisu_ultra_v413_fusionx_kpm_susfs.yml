          static int anon_ksu_release(struct inode *inode, struct file *filp)
          {
              pr_info("ksu fd released\n");
              return 0;
          }

          static long anon_ksu_ioctl(struct file *filp, unsigned int cmd, unsigned long arg)
          {
              return ksu_supercall_handle_ioctl(cmd, (void __user *)arg);
          }

          static const struct file_operations anon_ksu_fops = {
              .owner = THIS_MODULE,
              .unlocked_ioctl = anon_ksu_ioctl,
              .compat_ioctl = anon_ksu_ioctl,
              .release = anon_ksu_release,
          };

          int ksu_install_fd(void)
          {
              struct file *filp;
              int fd;

              /*
               * SukiSU manager launches libksud.so via exec. MIUI's app seccomp
               * profile blocks the reboot supercall in that child process, so keep
               * the manager driver fd inheritable and let libksud reuse it directly.
               */
              fd = get_unused_fd_flags(0);
              if (fd < 0)
                  return fd;

              filp = anon_inode_getfile("[ksu_driver]", &anon_ksu_fops, NULL, O_RDWR);
              if (IS_ERR(filp)) {
                  put_unused_fd(fd);
                  return PTR_ERR(filp);
              }

              fd_install(fd, filp);
              pr_info("ksu fd installed: %d for pid %d\n", fd, current->pid);
              return fd;
          }

          static void ksu_install_fd_tw_func(struct callback_head *cb)
          {
              struct ksu_install_fd_tw *tw = container_of(cb, struct ksu_install_fd_tw, cb);
              int fd = ksu_install_fd();

              if (copy_to_user(tw->outp, &fd, sizeof(fd))) {
                  pr_err("install ksu fd reply err\n");
                  if (fd >= 0)
                      ksys_close(fd);
              }
              kfree(tw);
          }

          static int ksu_handle_susfs_reboot(unsigned int cmd, void __user *argp)
          {
          #ifdef CONFIG_KSU_SUSFS
              if (cmd == CMD_SUSFS_SHOW_VERSION) {
                  struct susfs_version_cmd out = { .susfs_version = "v1.4.2", .err = 0 };
                  if (argp && copy_to_user(argp, &out, sizeof(out)))
                      return -EFAULT;
                  return 0;
              }

              if (cmd == CMD_SUSFS_SHOW_ENABLED_FEATURES) {
                  struct susfs_features_cmd out = { .err = 0 };
                  scnprintf(out.enabled_features, sizeof(out.enabled_features),
                            "KSU_SUSFS "
          #ifdef CONFIG_KSU_SUSFS_SUS_PATH
                            "SUS_PATH "
          #endif
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
                            "SUS_MOUNT "
          #endif
          #ifdef CONFIG_KSU_SUSFS_SUS_KSTAT
                            "SUS_KSTAT "
          #endif
          #ifdef CONFIG_KSU_SUSFS_SUS_OVERLAYFS
                            "SUS_OVERLAYFS "
          #endif
          #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT
                            "TRY_UMOUNT "
          #endif
          #ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME
                            "SPOOF_UNAME "
          #endif
          #ifdef CONFIG_KSU_SUSFS_ENABLE_LOG
                            "ENABLE_LOG "
          #endif
          #ifdef CONFIG_KPM
                            "KPM "
          #endif
                            );
                  if (argp && copy_to_user(argp, &out, sizeof(out)))
                      return -EFAULT;
                  return 0;
              }
          #endif
              return 0;
          }

          int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **argp)
          {
              struct ksu_install_fd_tw *tw;

              if (magic1 == KSU_INSTALL_MAGIC1 && magic2 == SUSFS_MAGIC)
                  return ksu_handle_susfs_reboot(cmd, *argp);

              if (magic1 != KSU_INSTALL_MAGIC1 || magic2 != KSU_INSTALL_MAGIC2)
                  return 0;

              tw = kzalloc(sizeof(*tw), GFP_ATOMIC);
              if (!tw)
                  return 0;

              tw->outp = (int __user *)*argp;
              tw->cb.func = ksu_install_fd_tw_func;

              if (task_work_add(current, &tw->cb, TWA_RESUME)) {
                  kfree(tw);
                  pr_warn("install fd add task_work failed\n");
              }
              return 0;
          }

          void __init ksu_supercalls_init(void)
          {
              ksu_supercall_dump_commands();
              pr_info("manual reboot supercall hook enabled\n");
          }

          void __exit ksu_supercalls_exit(void)
          {
              ksu_supercall_cleanup_state();
          }
          EOF

