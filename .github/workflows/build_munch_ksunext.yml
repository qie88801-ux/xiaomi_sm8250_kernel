name: Build Munch KSU Next Kernel
run-name: Build munch KernelSU Next from MiCode 4.19.157
on:
  workflow_dispatch:
    inputs:
      phonea:
        description: Device codename
        required: true
        default: munch
        type: string
      roota:
        description: Root mode
        required: true
        default: ksunext
        type: string

jobs:
  build_job:
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CI: "false"
    steps:
      - name: Prepare toolchain
        run: |
          mkdir "$GITHUB_WORKSPACE/proton-clang"
          cd "$GITHUB_WORKSPACE/proton-clang"
          wget https://github.com/kdrag0n/proton-clang/archive/refs/tags/20210522.zip
          unzip 20210522.zip
          cd ..
          sudo apt update
          sudo apt install -y build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: Build kernel
        run: |
          set -euxo pipefail
          mkdir "$GITHUB_WORKSPACE/kernel_workspace"
          cd "$GITHUB_WORKSPACE/kernel_workspace"
          git clone https://github.com/MiCode/Xiaomi_Kernel_OpenSource -b munch-s-oss --depth=1 android_kernel
          cd android_kernel

          TOOLCHAIN="$GITHUB_WORKSPACE/proton-clang/proton-clang-20210522/bin"
          ARM32_WRAP="$GITHUB_WORKSPACE/arm32-toolchain-wrapper"
          mkdir -p "$ARM32_WRAP"
          for tool in as ld objcopy elfedit gcc; do
            ln -sf "/usr/bin/arm-linux-gnueabi-$tool" "$ARM32_WRAP/arm-linux-gnueabi-$tool"
          done
          ln -sf /usr/bin/arm-linux-gnueabi-as "$ARM32_WRAP/as"
          ln -sf /usr/bin/arm-linux-gnueabi-ld "$ARM32_WRAP/ld"
          export PATH="/usr/bin:$TOOLCHAIN:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 O=out CC=$TOOLCHAIN/clang CROSS_COMPILE=$TOOLCHAIN/aarch64-linux-gnu- CROSS_COMPILE_ARM32=$ARM32_WRAP/arm-linux-gnueabi- CROSS_COMPILE_COMPAT=$ARM32_WRAP/arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu-"

          echo "[kernel version]"
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) =' Makefile
          echo "[clang version]"
          "$TOOLCHAIN/clang" --version
          echo "[aarch64 GNU ld version]"
          "$TOOLCHAIN/aarch64-linux-gnu-ld" --version | head -n 1

          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

          perl -0pi -e 's@(\nint do_execve_file\(struct file \*file, void \*__argv, void \*__envp\))@\n#ifdef CONFIG_KSU\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\n#endif\n$1@' fs/exec.c
          perl -0pi -e 's@(\tstruct user_arg_ptr envp = \{ \.ptr\.native = __envp \};\n)(\treturn do_execveat_common\(AT_FDCWD, filename, argv, envp, 0\);)@$1#ifdef CONFIG_KSU\n\t{\n\t\tint ksu_fd = AT_FDCWD;\n\t\tint ksu_flags = 0;\n\t\tksu_handle_execveat(&ksu_fd, &filename, &argv, &envp, &ksu_flags);\n\t}\n#endif\n$2@' fs/exec.c
          perl -0pi -e 's@(\tstruct user_arg_ptr envp = \{ \.ptr\.native = __envp \};\n\n)(\treturn do_execveat_common\(fd, filename, argv, envp, flags\);)@$1#ifdef CONFIG_KSU\n\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n#endif\n\n$2@' fs/exec.c
          perl -0pi -e 's@(\tstruct user_arg_ptr envp = \{\n\t\t\.is_compat = true,\n\t\t\.ptr\.compat = __envp,\n\t\};\n)(\treturn do_execveat_common\(AT_FDCWD, filename, argv, envp, 0\);)@$1#ifdef CONFIG_KSU\n\t{\n\t\tint ksu_fd = AT_FDCWD;\n\t\tint ksu_flags = 0;\n\t\tksu_handle_execveat(&ksu_fd, &filename, &argv, &envp, &ksu_flags);\n\t}\n#endif\n$2@' fs/exec.c
          perl -0pi -e 's@(\tstruct user_arg_ptr envp = \{\n\t\t\.is_compat = true,\n\t\t\.ptr\.compat = __envp,\n\t\};\n)(\treturn do_execveat_common\(fd, filename, argv, envp, flags\);)@$1#ifdef CONFIG_KSU\n\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n#endif\n$2@' fs/exec.c

          perl -0pi -e 's@(\nSYSCALL_DEFINE3\(faccessat, int, dfd, const char __user \*, filename, int, mode\)\n\{\n)(\treturn do_faccessat\(dfd, filename, mode\);\n\})@\n#ifdef CONFIG_KSU\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif\n$1#ifdef CONFIG_KSU\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif\n$2@' fs/open.c

          perl -0pi -e 's@(\nSYSCALL_DEFINE3\(read, unsigned int, fd, char __user \*, buf, size_t, count\)\n\{\n)(\treturn ksys_read\(fd, buf, count\);\n\})@\n#ifdef CONFIG_KSU\nextern void ksu_handle_sys_read(unsigned int fd);\n#endif\n$1#ifdef CONFIG_KSU\n\tksu_handle_sys_read(fd);\n#endif\n$2@' fs/read_write.c

          perl -0pi -e 's@(\n#if !defined\(__ARCH_WANT_STAT64\) \|\| defined\(__ARCH_WANT_SYS_NEWFSTATAT\)\nSYSCALL_DEFINE4\(newfstatat, int, dfd, const char __user \*, filename,\n\t\tstruct stat __user \*, statbuf, int, flag\)\n\{\n)(\tstruct kstat stat;\n\tint error;)@\n#ifdef CONFIG_KSU\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);\n#endif\n$1#ifdef CONFIG_KSU\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif\n$2@' fs/stat.c

          perl -0pi -e 's@(\nSYSCALL_DEFINE4\(reboot, int, magic1, int, magic2, unsigned int, cmd,\n\t\tvoid __user \*, arg\)\n\{\n)(\tstruct pid_namespace \*pid_ns = task_active_pid_ns\(current\);\n\tchar buffer\[256\];\n\tint ret = 0;\n)@\n#ifdef CONFIG_KSU\nextern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n#endif\n$1$2#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n@' kernel/reboot.c

          grep -q "select MODULE_REL_CRCS if MODVERSIONS" arch/arm64/Kconfig || \
            sed -i '/select HAVE_ARCH_PREL32_RELOCATIONS/a\\tselect MODULE_REL_CRCS if MODVERSIONS' arch/arm64/Kconfig

          if ! grep -q "^int path_umount(struct path \\*path, int flags)" fs/namespace.c; then
            tmp_path_umount=$(mktemp)
            cat > "$tmp_path_umount" <<'EOF'
          static int can_umount(const struct path *path, int flags)
          {
              struct mount *mnt = real_mount(path->mnt);

              if (flags & ~(MNT_FORCE | MNT_DETACH | MNT_EXPIRE | UMOUNT_NOFOLLOW))
                  return -EINVAL;
              if (!may_mount())
                  return -EPERM;
              if (path->dentry != path->mnt->mnt_root)
                  return -EINVAL;
              if (!check_mnt(mnt))
                  return -EINVAL;
              if (mnt->mnt.mnt_flags & MNT_LOCKED)
                  return -EINVAL;
              if (flags & MNT_FORCE && !capable(CAP_SYS_ADMIN))
                  return -EPERM;

              return 0;
          }

          int path_umount(struct path *path, int flags)
          {
              struct mount *mnt = real_mount(path->mnt);
              int ret;

              ret = can_umount(path, flags);
              if (!ret)
                  ret = do_umount(mnt, flags);

              dput(path->dentry);
              mntput_no_expire(mnt);
              return ret;
          }

          EOF
            awk 'FNR==NR { patch = patch $0 ORS; next } /^static bool is_mnt_ns_file/ && !done { printf "%s", patch; done = 1 } { print }' "$tmp_path_umount" fs/namespace.c > fs/namespace.c.new
            mv fs/namespace.c.new fs/namespace.c
            rm "$tmp_path_umount"
          fi

          grep -q "^int path_umount(struct path \\*path, int flags);" fs/internal.h || \
            sed -i '/^extern void __init mnt_init/i int path_umount(struct path *path, int flags);' fs/internal.h

          sed -i 's/^EXPORT_SYMBOL(gsi_write_channel_scratch);$/\/\* EXPORT_SYMBOL(gsi_write_channel_scratch) disabled: missing generated modversion CRC in public munch source. \*\//' drivers/platform/msm/gsi/gsi.c
          sed -i 's/^EXPORT_SYMBOL(gsi_read_channel_scratch);$/\/\* EXPORT_SYMBOL(gsi_read_channel_scratch) disabled: missing generated modversion CRC in public munch source. \*\//' drivers/platform/msm/gsi/gsi.c

          if grep -q "struct selinux_state selinux_state __rticdata;" security/selinux/hooks.c; then
            perl -0pi -e 's/struct selinux_state selinux_state __rticdata;/struct selinux_state selinux_state;/' security/selinux/hooks.c
          fi

          if ! git grep -q "dsi_display_get_disp_param.*{" -- drivers/gpu/drm drivers/video techpack 2>/dev/null; then
            cat >> drivers/gpu/drm/drm_sysfs.c <<'EOF'

          /* Xiaomi public munch source declares these display helpers but does not
           * ship their implementation. Keep connector sysfs present and make the
           * unsupported private display hooks return deterministic no-op values.
           */
          int dsi_display_set_disp_param(struct drm_connector *connector, u32 param_type)
          {
              (void)connector;
              (void)param_type;
              return -EOPNOTSUPP;
          }

          int dsi_display_get_disp_param(struct drm_connector *connector, u32 *param_type)
          {
              (void)connector;
              if (param_type)
                  *param_type = 0;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_write_mipi_reg(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_read_mipi_reg(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_read_oled_pmic_id(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_read_panel_info(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_read_wp_info(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_read_dynamic_fps(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          int dsi_display_set_doze_brightness(struct drm_connector *connector, int doze_brightness)
          {
              (void)connector;
              (void)doze_brightness;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_get_doze_brightness(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          int dsi_display_read_gamma_param(struct drm_connector *connector)
          {
              (void)connector;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_print_gamma_param(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_fod_get(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          ssize_t complete_commit_time_get(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          int dsi_display_set_thermal_hbm_disabled(struct drm_connector *connector, bool thermal_hbm_disabled)
          {
              (void)connector;
              (void)thermal_hbm_disabled;
              return -EOPNOTSUPP;
          }

          int dsi_display_get_thermal_hbm_disabled(struct drm_connector *connector, bool *thermal_hbm_disabled)
          {
              (void)connector;
              if (thermal_hbm_disabled)
                  *thermal_hbm_disabled = false;
              return -EOPNOTSUPP;
          }

          ssize_t dsi_display_get_hw_vsync_info(struct drm_connector *connector, char *buf)
          {
              (void)connector;
              (void)buf;
              return -EOPNOTSUPP;
          }

          ssize_t smart_fps_value_show(struct device *device, struct device_attribute *attr, char *buf)
          {
              (void)device;
              (void)attr;
              return scnprintf(buf, PAGE_SIZE, "0\n");
          }
          EOF
          fi

          make $MAKE_ARGS "${{ inputs.phonea }}_user_defconfig"
          scripts/config --file out/.config \
            -e KPROBES \
            -e KPROBE_EVENTS \
            -e KSU \
            -e KSU_MANUAL_HOOK \
            -d KSU_KPROBES_HOOK \
            -e MODULE_REL_CRCS \
            -e KALLSYMS \
            -e KALLSYMS_ALL
          make $MAKE_ARGS olddefconfig

          echo '--- Final KSU Next config ---'
          grep -E 'CONFIG_KPROBES|CONFIG_KPROBE_EVENTS|CONFIG_KSU|CONFIG_KSU_MANUAL_HOOK|CONFIG_KSU_KPROBES_HOOK|CONFIG_MODULE_REL_CRCS|CONFIG_MODVERSIONS|CONFIG_KALLSYMS' out/.config || true

          make $MAKE_ARGS -j"$(nproc)" Image

          mkdir -p "$GITHUB_WORKSPACE/munch-ksunext-output"
          cp out/arch/arm64/boot/Image "$GITHUB_WORKSPACE/munch-ksunext-output/Image"
          cp out/.config "$GITHUB_WORKSPACE/munch-ksunext-output/kernel.config"
          sha256sum "$GITHUB_WORKSPACE/munch-ksunext-output/Image" | tee "$GITHUB_WORKSPACE/munch-ksunext-output/SHA256SUMS"
          strings "$GITHUB_WORKSPACE/munch-ksunext-output/Image" | grep -m1 'Linux version' | tee "$GITHUB_WORKSPACE/munch-ksunext-output/kernel-version.txt" || true

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.phonea }}-${{ inputs.roota }}-micode-4.19.157-image
          path: munch-ksunext-output/*
          retention-days: 3
