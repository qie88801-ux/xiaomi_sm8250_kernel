name: Build Munch SukiSU Kernel
run-name: Build munch SukiSU Ultra KPM SUSFS
on:
  workflow_dispatch:
    inputs:
      phonea:
        description: Device codename
        required: true
        default: munch
        type: string
      roota:
        description: Root mode, use ksu for SukiSU Ultra
        required: true
        default: ksu
        type: string

jobs:
  build_job:
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CI: "false"
    steps:
      - name: Prepare toolchain
        run: |
          mkdir "$GITHUB_WORKSPACE/proton-clang"
          cd "$GITHUB_WORKSPACE/proton-clang"
          wget https://github.com/kdrag0n/proton-clang/archive/refs/tags/20210522.zip
          unzip 20210522.zip
          cd ..
          sudo apt update
          sudo apt install -y build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3

      - name: Build kernel
        run: |
          mkdir "$GITHUB_WORKSPACE/kernel_workspace"
          cd "$GITHUB_WORKSPACE/kernel_workspace"
          git clone https://github.com/clcwpwqi/kernel_865_mod -b android15-lineage22-mod --depth=1 android_kernel
          cd android_kernel
          python3 - <<'PY'
          from pathlib import Path
          p = Path('build-action.sh')
          s = p.read_text()
          s = s.replace('bash -s susfs-main', 'bash -s main')
          setup = '    curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main\n'
          extra = (
              '    curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main\n'
              '    find -L drivers/kernelsu -name "*.c" -type f -exec sed -i "s/access_ok(/access_ok(VERIFY_READ, /g" {} +\n'
              "    perl -0pi -e 's@#include <linux/pgtable.h>@#include <asm/pgtable.h>@g; s@#include <linux/uaccess.h>\\n@#include <linux/uaccess.h>\\n#ifndef strncpy_from_user_nofault\\n#define strncpy_from_user_nofault strncpy_from_user\\n#endif\\n@g' drivers/kernelsu/feature/sucompat.c\n"
              "    perl -0pi -e 's@#include \"linux/uaccess.h\"\\n@#include \"linux/uaccess.h\"\\n#ifndef copy_to_kernel_nofault\\n#define copy_to_kernel_nofault probe_kernel_write\\n#endif\\n@g' drivers/kernelsu/hook/arm64/patch_memory.c\n"
              "    perl -0pi -e 's@#include <linux/mount.h>\\n@#include <linux/mount.h>\\n#ifndef security_inode_init_security_anon\\n#define security_inode_init_security_anon(inode, qname, context_inode) ((void)(inode), (void)(qname), (void)(context_inode), 0)\\n#endif\\n#ifndef selinux_inode\\n#define selinux_inode(inode) ((struct inode_security_struct *)((inode)->i_security))\\n#endif\\n@g; s@#if LINUX_VERSION_CODE >= KERNEL_VERSION\\(6, 1, 0\\)\\nstatic int ksu_wrapper_iopoll.*?#endif\\n\\n@@s; s@// no REMAP_FILE_DEDUP: use file_in.*?static int ksu_wrapper_fadvise@static int ksu_wrapper_fadvise@s; s@^    p->ops\\.iopoll = .*\\n@@m; s@^    p->ops\\.remap_file_range = .*\\n@@m' drivers/kernelsu/infra/file_wrapper.c\n"
              "    perl -0pi -e 's@#include <linux/seccomp.h>\\n@#include <linux/seccomp.h>\\n#include <asm/unistd.h>\\n#ifndef SECCOMP_ARCH_NATIVE_NR\\n#define SECCOMP_ARCH_NATIVE_NR __NR_syscalls\\n#endif\\n@g' drivers/kernelsu/infra/seccomp_cache.c\n"
              "    perl -0pi -e 's@#include <uapi/linux/mount.h>@#include <uapi/linux/fs.h>\\n#include <asm/uaccess.h>@g; s@extern int path_mount\\(.*?\\);\\n\\n@@s; s@    // make root mount private\\n    struct path root_path;\\n    get_fs_root\\(current->fs, &root_path\\);\\n    int pm_ret = path_mount\\(NULL, &root_path, NULL, MS_PRIVATE \\| MS_REC, NULL\\);\\n    path_put\\(&root_path\\);@    // make root mount private\\n    mm_segment_t old_fs = get_fs();\\n    set_fs(KERNEL_DS);\\n    int pm_ret = ksys_mount(NULL, \"/\", NULL, MS_PRIVATE | MS_REC, NULL);\\n    set_fs(old_fs);@s' drivers/kernelsu/infra/su_mount_ns.c\n"
              '    tmp_ksu_init=$(mktemp)\n'
              '    printf "#ifndef MODULE_IMPORT_NS\\n#define MODULE_IMPORT_NS(ns)\\n#endif\\n" > "$tmp_ksu_init"\n'
              '    cat drivers/kernelsu/core/init.c >> "$tmp_ksu_init"\n'
              '    mv "$tmp_ksu_init" drivers/kernelsu/core/init.c\n'
          )
          s = s.replace(setup, extra, 1)
          s = s.replace('    -e KSU \\\n', '    -e KPROBES \\\n    -e KRETPROBES \\\n    -e KSU \\\n', 1)
          p.write_text(s)
          PY
          grep -n -E 'bash -s main|access_ok|pgtable|nofault|file_wrapper|MODULE_IMPORT_NS|KPROBES|KRETPROBES|KSU' build-action.sh
          bash build-action.sh "${{ inputs.phonea }}" "${{ inputs.roota }}"
          echo '--- Final KSU config ---'
          grep -E 'CONFIG_KPROBES|CONFIG_KRETPROBES|CONFIG_KSU|CONFIG_KSU_SUSFS|CONFIG_KPM' out/.config || true

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.phonea }}-${{ inputs.roota }}-kernel-AnyKernel3
          path: |
            kernel_workspace/android_kernel/*.zip
            kernel_workspace/android_kernel/anykernel/*.zip
          retention-days: 3
